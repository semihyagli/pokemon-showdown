<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pokémon Search</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<main>
		<h1>Pokémon search</h1>
		<form id="search-form">
			<div class="row">
				<label>Generation
					<select id="gen" name="gen"></select>
				</label>
				<label>Format (optional)
					<select id="format" name="format"><option value="">— none —</option></select>
				</label>
			</div>
			<label>Ability
				<div class="ac"><input type="text" id="ability" autocomplete="off" placeholder="type to search…"></div>
			</label>
			<fieldset>
				<legend>Moves (up to 4 — must learn all)</legend>
				<div class="row">
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
				</div>
				<div class="row">
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
				</div>
			</fieldset>
			<div class="row">
				<label>Type 1
					<select id="type1"><option value="">— any —</option></select>
				</label>
				<label>Type 2
					<select id="type2"><option value="">— none —</option></select>
				</label>
			</div>
			<div class="row">
				<label>Faster than (Spe @ L50)
					<input type="number" id="faster" min="1" max="2000" placeholder="e.g. 120">
				</label>
				<label>Slower than (Spe @ L50)
					<input type="number" id="slower" min="1" max="2000" placeholder="e.g. 200">
				</label>
			</div>
			<label>Min-IV floor
				<span class="floor">
					<label><input type="radio" name="floor" value="0iv" checked> 0 IV</label>
					<label><input type="radio" name="floor" value="31iv"> 31 IV</label>
				</span>
			</label>
			<button type="submit">Search</button>
		</form>
		<p id="status"></p>
		<div class="table-wrap">
		<table id="results" hidden>
			<thead>
				<tr>
					<th class="sortable" data-sort="num">Dex #<span class="arrow"></span></th>
					<th class="sortable" data-sort="name">Pokémon<span class="arrow"></span></th>
					<th class="sortable" data-sort="types">Types<span class="arrow"></span></th>
					<th>Abilities</th>
					<th class="sortable num-col" data-sort="hp">HP<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="atk">Atk<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="def">Def<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="spa">SpA<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="spd">SpD<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="spe">Spe<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="est" title="Effective stat total: HP + Def + SpD + Spe + max(Atk, SpA)">EST<span class="arrow"></span></th>
					<th class="speed-col" data-col="0" title="Click to hide rows out of range (red) in this column">Spe@L50<span class="fil"></span></th>
					<th class="speed-col" data-col="1" title="Speed @ L50 with Choice Scarf (×1.5). Click to hide red.">Scarf<span class="fil"></span></th>
					<th class="speed-col" data-col="2" title="Speed @ L50 with Tailwind (×2). Click to hide red.">Tailwind<span class="fil"></span></th>
					<th class="speed-col" data-col="3" title="Speed @ L50 with Choice Scarf + Tailwind (×3). Click to hide red.">Scarf+Tailwind<span class="fil"></span></th>
				</tr>
			</thead>
			<tbody></tbody>
		</table>
		</div>
	</main>
	<script src="/app.js"></script>
</body>
</html>
