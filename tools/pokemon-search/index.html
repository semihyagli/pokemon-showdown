<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Advanced Pokémon Search</title>
	<link rel="stylesheet" href="/style.css">
	<script>
		// Apply the saved theme before first paint to avoid a flash of the wrong
		// theme. Default is dark; only an explicit "light" choice switches it.
		document.documentElement.dataset.theme =
			localStorage.getItem('pokemon-search-theme') === 'light' ? 'light' : 'dark';
	</script>
</head>
<body>
	<button type="button" id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode"></button>
	<main>
		<h1>Advanced Pokémon Search</h1>
		<form id="search-form">
			<div class="row">
				<label>Generation
					<div class="ac"><input type="text" id="gen" autocomplete="off" placeholder="type to search…"></div>
				</label>
				<label>Format (optional)
					<div class="ac"><input type="text" id="format" autocomplete="off" placeholder="any format"></div>
				</label>
			</div>
			<label>Pokémon name
				<div class="ac"><input type="text" id="species" autocomplete="off" placeholder="type to search…"></div>
			</label>
			<label>Ability
				<div class="ac"><input type="text" id="ability" autocomplete="off" placeholder="type to search…"></div>
			</label>
			<fieldset>
				<legend>Moves (up to 4 — must learn all)</legend>
				<div class="row">
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
				</div>
				<div class="row">
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
					<div class="ac"><input type="text" class="move" autocomplete="off" placeholder="type to search…"></div>
				</div>
			</fieldset>
			<div class="row">
				<label>Type 1
					<select id="type1"><option value="">— any —</option></select>
				</label>
				<label>Type 2
					<select id="type2"><option value="">— none —</option></select>
				</label>
			</div>
			<div class="row">
				<div class="stab-group">
					<label>Resists STAB from
						<div class="ac"><input type="text" id="resiststab" autocomplete="off" placeholder="type a Pokémon…"></div>
					</label>
					<label class="checkbox-row" title="Also include Pokémon neutral to the STAB types, not just those that resist"><input type="checkbox" id="resiststab-neutral"> Incl. neutral</label>
				</div>
				<div class="stab-group">
					<label>Super Effective STAB against
						<div class="ac"><input type="text" id="superstab" autocomplete="off" placeholder="type a Pokémon…"></div>
					</label>
					<label class="checkbox-row" title="Also include Pokémon the STAB hits neutrally (not just super-effectively)"><input type="checkbox" id="superstab-neutral"> Incl. neutral</label>
				</div>
			</div>
			<div class="row">
				<label>Faster than (Spe @ L50)
					<input type="number" id="faster" min="1" max="2000" placeholder="e.g. 120">
				</label>
				<label>Slower than (Spe @ L50)
					<input type="number" id="slower" min="1" max="2000" placeholder="e.g. 200">
				</label>
			</div>
			<label>Min-IV floor
				<span class="floor">
					<label><input type="radio" name="floor" value="0iv" checked> 0 IV</label>
					<label><input type="radio" name="floor" value="31iv"> 31 IV</label>
				</span>
			</label>
			<fieldset>
				<legend>Special categories</legend>
				<label class="checkbox-row" title="Hide Pokémon that can still evolve (not fully evolved)"><input type="checkbox" id="exclude-unevolved" checked> Exclude unevolved (NFE)</label>
				<div class="chips" id="category-chips">
					<button type="button" class="chip" data-cat="megaprimal" data-state="any">Mega / Primal</button>
					<button type="button" class="chip" data-cat="mythical" data-state="any">Mythical</button>
					<button type="button" class="chip" data-cat="restrictedlegendary" data-state="any">Restricted Legendary</button>
					<button type="button" class="chip" data-cat="sublegendary" data-state="any">Sub-Legendary</button>
					<button type="button" class="chip" data-cat="ultrabeast" data-state="any">Ultra Beast</button>
					<button type="button" class="chip" data-cat="paradox" data-state="any">Paradox</button>
				</div>
				<p class="chip-hint">Click a chip to cycle: <span class="chip-key only">＋ only</span> <span class="chip-key exclude">－ exclude</span> · no mark = any</p>
			</fieldset>
			<div class="form-actions">
				<button type="submit">Search</button>
				<button type="button" id="reset" class="secondary" title="Clear all search options (pinned Pokémon stay)">Reset options</button>
			</div>
		</form>
		<p id="status"></p>
		<div class="table-wrap">
		<table id="results" hidden>
			<thead>
				<tr>
					<th class="pin-col"></th>
					<th class="sortable" data-sort="num">Dex #<span class="arrow"></span></th>
					<th class="sortable" data-sort="name">Pokémon<span class="arrow"></span></th>
					<th class="sortable" data-sort="types">Types<span class="arrow"></span></th>
					<th>Abilities</th>
					<th class="sortable num-col" data-sort="hp">HP<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="atk">Atk<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="def">Def<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="spa">SpA<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="spd">SpD<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="spe">Spe<span class="arrow"></span></th>
					<th class="sortable num-col" data-sort="est" title="Effective stat total: HP + Def + SpD + Spe + max(Atk, SpA)">EST<span class="arrow"></span></th>
					<th class="speed-col" data-col="0" title="Click to hide rows out of range (red) in this column">Spe@L50<span class="fil"></span></th>
					<th class="speed-col" data-col="1" title="Speed @ L50 with Choice Scarf (×1.5). Click to hide red.">Scarf<span class="fil"></span></th>
					<th class="speed-col" data-col="2" title="Speed @ L50 with Tailwind (×2). Click to hide red.">Tailwind<span class="fil"></span></th>
					<th class="speed-col" data-col="3" title="Speed @ L50 with Choice Scarf + Tailwind (×3). Click to hide red.">Scarf+Tailwind<span class="fil"></span></th>
				</tr>
			</thead>
			<tbody></tbody>
		</table>
		</div>
	</main>
	<script src="/app.js"></script>
</body>
</html>
